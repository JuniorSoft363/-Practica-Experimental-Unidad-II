spring.application.name=Guia_JAVA_PracticaExperimental

# Datasource configuration from environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT settings
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# CORS settings
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# OpenAPI Swagger docs path config
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html